; PHP limits for the training app (PHP-FPM / CGI reads .user.ini from the
; directory of the running script — that's public/index.php).
;
; These must stay >= the app's own upload rules in
; app/Concerns/TrainingValidationRules.php (video = 50 MB). post_max_size is
; kept a little above upload_max_filesize to leave room for the other form
; fields, and the timeouts give a large video time to finish streaming in on a
; slow connection instead of the FastCGI backend dying (which surfaces as a
; bare Apache "503 Service Unavailable").
upload_max_filesize = 64M
post_max_size = 68M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
